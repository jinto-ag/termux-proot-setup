# ═══════════════════════════════════════════════════════════════════════
# tmux.conf — Optimized for Termux mobile + proot Debian
# ═══════════════════════════════════════════════════════════════════════

# ── Prefix: Ctrl-a (easier on mobile extra-keys than Ctrl-b) ─
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General settings ─────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g escape-time 10
set -g repeat-time 600
set -g history-limit 5000
set -g focus-events on
set -g set-clipboard on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Mouse (ESSENTIAL for mobile touch) ─────────────────────────
set -g mouse on

# ── Status bar (minimal, saves screen space on mobile) ────────
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour248"
set -g status-left "#[fg=colour82,bold] #S "
set -g status-left-length 20
set -g status-right "#[fg=colour243]%H:%M "
set -g status-right-length 15
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour82,bold] #I:#W "

# ── Pane splitting (intuitive keys) ─────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim-style) ───────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resizing (hold prefix + HJKL) ──────────────────────
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# ── Window management ─────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window

# ── Quick reload ─────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ── Copy mode (vi keys) ─────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Session persistence (tmux-resurrect + tmux-continuum) ───
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save-shell-history 'on'
set -g @resurrect-dir "$HOME/.tmux/resurrect"
set -g @resurrect-strategy-vim 'session'

# Continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep as last line)
run '~/.tmux/plugins/tpm/tpm'
